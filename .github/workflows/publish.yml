name: Publish

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Compile
        run: bun run compile

      - name: Test
        run: bun run test

      - name: Smoke tests (e2e pipeline)
        run: bash scripts/smoke-tests.sh

      - name: Smoke tests (bash parser)
        run: bash scripts/smoke-tests-bash-parser.sh

      - name: Smoke tests (bash examples)
        run: bash scripts/smoke-tests-bash-examples.sh

      - name: Smoke tests (hook sanity)
        run: bash scripts/hook-smoke-tests.sh

      - name: Bundle
        run: bun run bundle

      - name: Publish
        run: |
          # TODO: publish to Claude marketplace here
          exit 1
