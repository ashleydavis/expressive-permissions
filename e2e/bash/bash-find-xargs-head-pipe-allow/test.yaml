description: "bash: find | xargs grep | head triple pipe all allow"

input:
  tool_name: Bash
  tool_input:
    command: "find ${PROJECT_DIR}/fixtures -name '*.yaml' | xargs grep -l 'git' 2>/dev/null | head -5"
  cwd: ${PROJECT_DIR}

rules:
  bash:
    find:
      cmd: "./**"
      decide: allow
    xargs:
      decide: allow
    head:
      decide: allow

expected:
  decision: allow
