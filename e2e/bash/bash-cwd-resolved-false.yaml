description: "bash: cwd_resolved false matches after cd $UNKNOWN"

input:
  tool_name: Bash
  tool_input:
    command: "cd $UNKNOWN; rm sensitive.txt"
  cwd: /home/user/project

rules:
  bash:
    rm:
      cwd_resolved: false
      decide: deny
      reason: "unresolved cwd"

expected:
