description: "bash: a $VAR set by X=Y earlier in the command is expanded before cmd matching, so the rule matches the variable's value"

input:
  tool_name: Bash
  tool_input:
    command: 'B=/tmp/scratch.txt; sed -i ''s/a/b/'' "$B"'
  cwd: /home/user/outside-the-project

rules:
  bash:
    sed:
      cmd-in:
        - "/tmp/**"
      decide: allow
      reason: sed within /tmp

expected:
  decision: allow
  reason: sed within /tmp
