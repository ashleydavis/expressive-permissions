description: "protecting-production: aws describe-instances → allow (read-only)"

input:
  tool_name: Bash
  tool_input:
    command: "aws ec2 describe-instances"
  cwd: /home/user/project

rules:
  bash:
    aws:
      - cmd:
          - "*"
          - describe-*
        decide: allow
      - cmd:
          - "*"
          - delete-*
        decide: deny
        reason: Deletion blocked

expected:
  decision: allow
