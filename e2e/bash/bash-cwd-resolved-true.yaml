description: "bash: cwd_resolved true matches resolved cwd"

input:
  tool_name: Bash
  tool_input:
    command: "rm sensitive.txt"
  cwd: /home/user/project

rules:
  bash:
    rm:
      cwd_resolved: true
      decide: deny
      reason: "deny in known dir"

expected:
  decision: deny
  reason: "deny in known dir"
