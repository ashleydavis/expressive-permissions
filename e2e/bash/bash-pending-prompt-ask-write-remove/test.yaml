description: "pending prompt: dated detail file on ask survives post-hook execution"

input:
  tool_name: Bash
  tool_input:
    command: "curl https://example.com"
  cwd: /home/user/project

rules:
  bash:
    curl:
      decide: ask
      reason: "network access requires approval"

expected:
  decision: ask
  reason: "network access requires approval"
  pending_prompt:
    count: 1
    filename_contains: curl-https-example-com
    content_contains:
      - "# Bash — ASK"
      - "curl https://example.com"
      - "## Verdict"

post_input:
  tool_name: Bash
  tool_input:
    command: "curl https://example.com"
  tool_response:
    output: ""
    isError: false
  cwd: /home/user/project

post_expected:
  pending_prompt_count: 1
