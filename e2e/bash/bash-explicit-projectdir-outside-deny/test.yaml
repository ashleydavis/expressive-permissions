description: "bash: find /etc with rule cmd: ${{PROJECT_DIR}}/** should not allow (guards against over-permissive substitution)"

input:
  tool_name: Bash
  tool_input:
    command: "find /etc -type f"
  cwd: ${PROJECT_DIR}

rules: {}

home_dir_files:
  bash-explicit-projectdir-only.yaml:
    bash:
      find:
        cmd: "${{PROJECT_DIR}}/**"
        decide: allow

expected:
  decision: ask
