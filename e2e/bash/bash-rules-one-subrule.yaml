description: "bash rules: single deny sub-rule matches → deny"

input:
  tool_name: Bash
  tool_input:
    command: "AWS_PROFILE=prod aws ec2 delete-instance --instance-id i-123"
  cwd: /home/user/project
  env:
    AWS_PROFILE: prod

rules:
  bash:
    aws:
      - env:
          AWS_PROFILE: "/^(?!sandbox$)/"
        rules:
          - cmd: "* delete-*"
            decide: deny
            reason: Destructive deletes blocked on non-sandbox profile

expected:
  decision: deny
  reason: Destructive deletes blocked on non-sandbox profile
