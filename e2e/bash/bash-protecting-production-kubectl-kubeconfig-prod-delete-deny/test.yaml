description: "kubectl kubeconfig: non-sandbox context, delete command → DENY"

input:
  tool_name: Bash
  tool_input:
    command: "kubectl delete pod mypod"
  cwd: /home/user/project

rules:
  bash:
    kubectl:
      - file:
          fixtures/kubeconfig-prod.yaml:
            contains: "current-context: sandbox"
        decide: allow
      - not:
          file:
            fixtures/kubeconfig-prod.yaml:
              contains: "current-context: sandbox"
        rules:
          - cmd: get
            decide: allow
          - cmd: describe
            decide: allow
          - cmd: delete
            decide: deny
            reason: Deleted resources outside sandbox may not be recoverable.

expected:
  decision: deny
