description: "protecting-production: kubectl scale outside sandbox → ask (catch-all)"

input:
  tool_name: Bash
  tool_input:
    command: "kubectl scale deployment my-app --replicas 3 --context staging-cluster"
  cwd: /home/user/project

project_dir_files:
  commands/kubectl.yaml:
    kubectl:
      description: Kubernetes CLI
      flags:
        context:
          arity: 1
          kind: string
          description: Kubeconfig context name
        replicas:
          arity: 1
          kind: string
          description: Number of replicas

rules:
  bash:
    kubectl:
      - options:
          context: sandbox-*
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: get
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: delete
        decide: deny
        reason: kubectl delete blocked outside sandbox
      - options:
          context: /^(?!sandbox)/
        decide: ask
        reason: Confirm kubectl operation outside sandbox

expected:
  decision: ask
  reason: Confirm kubectl operation outside sandbox
