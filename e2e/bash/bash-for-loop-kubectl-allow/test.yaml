description: "bash: for-loop with kubectl get pipeline; parser builds a for_loop node and rules apply per body command → allow"

input:
  tool_name: Bash
  tool_input:
    command: 'for region in ap-northwest-1 na-central-1; do echo "=== $region pods ==="; kubectl --context arn:aws:eks:$region:1234:cluster/example-cluster -n example-namespace get pods 2>&1 | grep -v Running | head -5; done'
  cwd: /home/user/project

project_dir_files:
  commands/kubectl.yaml:
    kubectl:
      description: Kubernetes CLI
      flags:
        context:
          arity: 1
          kind: string
          description: Kubeconfig context name
        n|namespace:
          arity: 1
          kind: string
          description: Kubernetes namespace

rules:
  bash:
    echo:
      decide: allow
    grep:
      decide: allow
    head:
      decide: allow
    kubectl:
      options:
        context: "/^arn:aws:eks:/"
      cmd: get
      decide: allow

expected:
  decision: allow
