description: "bash: cmd glob './**' matches paths through hidden directories (.claude-plugin, .git, etc.)"

input:
  tool_name: Bash
  tool_input:
    command: "cat plugin/.claude-plugin/plugin.json"
  cwd: ${PROJECT_DIR}

rules:
  bash:
    cat:
      cmd: "./**"
      decide: allow

expected:
  decision: allow
