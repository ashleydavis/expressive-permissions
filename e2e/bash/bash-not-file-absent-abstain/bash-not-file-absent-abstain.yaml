description: "bash not: file: file absent → ABSTAIN (neither rule fires)"

input:
  tool_name: Bash
  tool_input:
    command: "kubectl delete pod mypod"
  cwd: /home/user/project

rules:
  bash:
    kubectl:
      not:
        file:
          /nonexistent/path/to/file.yaml:
            contains: "sandbox"
      decide: deny

expected:
  decision: ask
