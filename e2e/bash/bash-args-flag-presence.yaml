description: "bash: flag present (-r) triggers deny"

input:
  tool_name: Bash
  tool_input:
    command: "rm -r dir"
  cwd: /home/user/project

rules:
  bash:
    rm:
      options:
        - r
      decide: deny
      reason: "recursive rm denied"

expected:
  decision: deny
  reason: "recursive rm denied"
