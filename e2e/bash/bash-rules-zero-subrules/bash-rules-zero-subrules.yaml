description: "bash rules: empty rules list → no sub-rule decides → ABSTAIN (system default ask)"

input:
  tool_name: Bash
  tool_input:
    command: "AWS_PROFILE=prod aws ec2 describe-instances"
  cwd: /home/user/project
  env:
    AWS_PROFILE: prod

rules:
  bash:
    aws:
      - env:
          AWS_PROFILE: "/^(?!sandbox$)/"
        rules: []

expected:
  decision: ask
