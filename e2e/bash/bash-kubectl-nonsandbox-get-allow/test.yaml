description: "protecting-production: kubectl get outside sandbox → allow (read-only)"

input:
  tool_name: Bash
  tool_input:
    command: "kubectl get pods --context prod-cluster"
  cwd: /home/user/project

project_dir_files:
  commands/kubectl.yaml:
    kubectl:
      description: Kubernetes CLI
      flags:
        context:
          arity: 1
          kind: string
          description: Kubeconfig context name

rules:
  bash:
    kubectl:
      - options:
          context: sandbox-*
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: get
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: delete
        decide: deny
        reason: kubectl delete blocked outside sandbox

expected:
  decision: allow
