description: "protecting-production: kubectl get outside sandbox → allow (read-only)"

input:
  tool_name: Bash
  tool_input:
    command: "kubectl get pods --context prod-cluster"
  cwd: /home/user/project

rules:
  bash:
    kubectl:
      - options:
          context: sandbox-*
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: get
        decide: allow
      - options:
          context: /^(?!sandbox)/
        cmd: delete
        decide: deny
        reason: kubectl delete blocked outside sandbox

expected:
  decision: allow
