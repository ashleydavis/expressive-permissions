description: "read: cwd rule matches when cwd tracking is resolved"

input:
  tool_name: Read
  tool_input:
    file_path: /home/user/project/secrets.txt
  cwd: /home/user/project

rules:
  read:
    - cwd: /home/user/**
      rules:
        - path: "**/secrets.txt"
          decide: deny
          reason: secrets in known dir

expected:
  decision: deny
  reason: secrets in known dir
