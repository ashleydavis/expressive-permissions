description: "file rules: write in production cwd + .ts path → catch-all ask"
source_e2e: e2e/file/write-rules-catch-all-ask/test.yaml
input:
  tool_name: Write
  tool_input:
    file_path: /projects/production/app/index.ts
    content: export const x = 1;
  cwd: /projects/production/app
rules:
  write:
    - cwd: /projects/production/**
      rules:
        - path: "**/*.env"
          decide: deny
          reason: Env files in production are protected.
        - decide: ask
          reason: Confirm write to production directory.
expected:
  decision: ask
  reason: Confirm write to production directory.
