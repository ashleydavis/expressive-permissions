description: "bash: flag alias --recursive matches r|recursive"
source_e2e: e2e/bash/bash-args-alias/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: rm --recursive dir
  cwd: /home/user/project
rules:
  bash:
    rm:
      options:
        - r|recursive
      decide: deny
      reason: recursive rm denied
expected:
  decision: deny
  reason: recursive rm denied
