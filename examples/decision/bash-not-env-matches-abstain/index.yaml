description: "bash not: env matches → ABSTAIN (rule suppressed, falls to default ask)"
source_e2e: e2e/bash/bash-not-env-matches-abstain/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: AWS_PROFILE=sandbox aws ec2 delete-vpc --vpc-id vpc-12345
  cwd: /home/user/project
rules:
  bash:
    aws:
      decide: deny
      not:
        env:
          AWS_PROFILE: sandbox
expected:
  decision: ask
