description: "bash: cat -n <path>; -n is arity-0 so path is the first positional
  and cmd rule allows"
source_e2e: e2e/bash/bash-cat-flag-before-path-allow/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: cat -n fixtures/data.txt
  cwd: ${PROJECT_DIR}
rules:
  bash:
    cat:
      cmd: fixtures/data.txt
      decide: allow
expected:
  decision: allow
