description: "integration: (FOO=bar); cmd — subshell assignment must NOT leak to later commands"
source_e2e: e2e/integration/env-set-subshell-no-leak/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: "(FOO=bar); ls"
  cwd: /home/user/project
rules:
  bash:
    "":
      decide: allow
    ls:
      env:
        FOO: bar
      decide: allow
expected:
  decision: ask
