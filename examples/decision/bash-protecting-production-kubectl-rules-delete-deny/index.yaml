description: "protecting-production: kubectl rules: non-sandbox context + delete → deny"
source_e2e: e2e/bash/bash-protecting-production-kubectl-rules-delete-deny/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: kubectl delete pod mypod --context prod-cluster
  cwd: /home/user/project
rules:
  bash:
    kubectl:
      - options:
          context: sandbox-*
        decide: allow
      - options:
          context: /^(?!sandbox)/
        rules:
          - cmd: get
            decide: allow
            reason: Read-only resource listing.
          - cmd: describe
            decide: allow
            reason: Read-only resource inspection.
          - cmd: delete
            decide: deny
            reason: Deleted resources outside sandbox may not be recoverable.
          - decide: ask
            reason: Confirm kubectl operation outside sandbox
expected:
  decision: deny
  reason: Deleted resources outside sandbox may not be recoverable.
project_dir_files:
  commands/kubectl.yaml:
    kubectl:
      description: Kubernetes CLI
      flags:
        context:
          arity: 1
          kind: string
          description: Kubeconfig context name
