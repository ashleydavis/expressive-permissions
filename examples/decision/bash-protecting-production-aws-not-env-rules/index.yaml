description: "protecting-production: aws not env AWS_PROFILE sandbox with nested rules → deny delete (PROTECTING-PRODUCTION.md AWS: matching on the active profile)"
input:
  tool_name: Bash
  tool_input:
    command: AWS_PROFILE=prod aws ec2 delete-vpc --vpc-id vpc-abc123
  cwd: /home/user/project
rules:
  bash:
    aws:
      - env:
          AWS_PROFILE: sandbox
        decide: allow
      - not:
          env:
            AWS_PROFILE: sandbox
        rules:
          - cmd: "* delete-*"
            decide: deny
            reason: Destructive deletes on non-sandbox profiles risk permanent data loss.
          - cmd: "* terminate-*"
            decide: deny
            reason: Terminating instances on non-sandbox profiles causes irreversible downtime.
          - decide: ask
            reason: Confirm AWS operation on non-sandbox profile
expected:
  decision: deny
  reason: Destructive deletes on non-sandbox profiles risk permanent data loss.
