description: "protecting-production: kubectl rollout restart → deny (PROTECTING-PRODUCTION.md Block write and exec operations)"
input:
  tool_name: Bash
  tool_input:
    command: kubectl rollout restart deployment/my-app
  cwd: /home/user/project
rules:
  bash:
    kubectl:
      - rollout:
          restart:
            decide: deny
            reason: Rolling restarts cause temporary service disruption and should go through the deployment pipeline.
      - get:
          decide: allow
expected:
  decision: deny
  reason: Rolling restarts cause temporary service disruption and should go through the deployment pipeline.
