description: for-loop sets $region per iteration; env-matched rule fires once
  per iteration; both iterations allow → allow
source_e2e: e2e/bash/bash-for-loop-env-allow/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: for region in ap-northwest-1 na-central-1; do kubectl --context $region
      get pods; done
  cwd: /home/user/project
rules:
  bash:
    kubectl:
      - env:
          region: ap-northwest-1
        decide: allow
      - env:
          region: na-central-1
        decide: allow
expected:
  decision: allow
