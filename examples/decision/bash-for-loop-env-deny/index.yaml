description: for-loop sets $region per iteration; deny rule fires only on
  prod-region iteration; strictest-wins → deny
source_e2e: e2e/bash/bash-for-loop-env-deny/test.yaml
input:
  tool_name: Bash
  tool_input:
    command: for region in ap-northwest-1 prod-region; do kubectl --context $region
      get pods; done
  cwd: /home/user/project
rules:
  bash:
    kubectl:
      - env:
          region: ap-northwest-1
        decide: allow
      - env:
          region: prod-region
        decide: deny
        reason: prod-region not allowed
expected:
  decision: deny
  reason: prod-region not allowed
