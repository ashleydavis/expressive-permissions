tool_call:
  tool_name: Bash
  tool_input:
    command: while read line; do echo $line; done
ast:
  type: bash
  source: while read line; do echo $line; done
  children:
    command:
      type: while_loop
      source: while read line; do echo $line; done
      children:
        condition:
          type: command
          source: read line
          commandName: read
          options: {}
          positionals:
            - line
          envPrefix: {}
        body:
          type: command
          source: echo $line
          commandName: echo
          options: {}
          positionals:
            - $line
          envPrefix: {}
      until: false
