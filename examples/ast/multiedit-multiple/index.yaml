tool_call:
  tool_name: MultiEdit
  tool_input:
    file_path: /tmp/foo.ts
    edits:
      - old_string: "foo"
        new_string: "bar"
      - old_string: "baz"
        new_string: "qux"
        replace_all: true
      - old_string: "alpha"
        new_string: "beta"
ast:
  type: multiedit
  file_path: /tmp/foo.ts
  edits:
    - old_string: foo
      new_string: bar
    - old_string: baz
      new_string: qux
      replace_all: true
    - old_string: alpha
      new_string: beta
