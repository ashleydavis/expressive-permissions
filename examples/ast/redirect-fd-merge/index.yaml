tool_call:
  tool_name: Bash
  tool_input:
    command: cmd > out.log 2>&1
ast:
  type: bash
  source: cmd > out.log 2>&1
  children:
    command:
      type: redirect
      source: cmd > out.log 2>&1
      children:
        command:
          type: redirect
          source: cmd > out.log
          children:
            command:
              type: command
              source: cmd > out.log 2>&1
              commandName: cmd
              options: {}
              positionals: []
              envPrefix: {}
          op: ">"
          target: out.log
      op: 2>&
      target: "1"
