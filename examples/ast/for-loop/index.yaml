tool_call:
  tool_name: "Bash"
  tool_input:
    command: "for f in a b c; do echo $f; done"
ast:
  type: "bash"
  raw: "for f in a b c; do echo $f; done"
  ast:
    type: "for_loop"
    variable: "f"
    items:
      - "a"
      - "b"
      - "c"
    body:
      type: "command"
      binary: "echo"
      options: {}
      cmd: "$f"
      envPrefix: {}
      raw: "echo $f"
    raw: "for f in a b c; do echo $f; done"
