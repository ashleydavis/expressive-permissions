tool_call:
  tool_name: Bash
  tool_input:
    command: 'for region in ap-northwest-1 na-central-1; do echo "=== $region pods ==="; kubectl --context arn:aws:eks:$region:1234:cluster/example-cluster -n example-namespace get pods 2>&1 | grep -v Running | head -5; done'
descriptors:
  kubectl:
    description: "Kubernetes CLI"
    flags:
      context:
        arity: 1
        kind: string
        description: "Kubernetes context name"
      "n|namespace":
        arity: 1
        kind: string
        description: "Kubernetes namespace"
  grep:
    description: "Search file contents"
    flags:
      "v|invert-match":
        arity: 1
        kind: string
        description: "Invert match"
  head:
    description: "Output first lines"
    flags:
      "n|lines":
        arity: 1
        kind: string
        description: "Number of lines"
ast:
  type: bash
  raw: 'for region in ap-northwest-1 na-central-1; do echo "=== $region pods ==="; kubectl --context arn:aws:eks:$region:1234:cluster/example-cluster -n example-namespace get pods 2>&1 | grep -v Running | head -5; done'
  ast:
    type: for_loop
    variable: region
    items:
      - ap-northwest-1
      - na-central-1
    body:
      type: binop
      op: ";"
      left:
        type: command
        binary: echo
        options: {}
        cmd: "=== $region pods ==="
        envPrefix: {}
        redirects: []
        raw: 'echo "=== $region pods ==="'
      right:
        type: binop
        op: "|"
        left:
          type: binop
          op: "|"
          left:
            type: command
            binary: kubectl
            options:
              context: "arn:aws:eks:$region:1234:cluster/example-cluster"
              n: example-namespace
            cmd:
              - get
              - pods
            envPrefix: {}
            redirects:
              - op: "2>&"
                target: "1"
            raw: "kubectl --context arn:aws:eks:$region:1234:cluster/example-cluster -n example-namespace get pods 2>&1"
          right:
            type: command
            binary: grep
            options:
              v: Running
            cmd: []
            envPrefix: {}
            redirects: []
            raw: "grep -v Running"
        right:
          type: command
          binary: head
          options:
            "5": true
          cmd: []
          envPrefix: {}
          redirects: []
          raw: "head -5"
    raw: 'for region in ap-northwest-1 na-central-1; do echo "=== $region pods ==="; kubectl --context arn:aws:eks:$region:1234:cluster/example-cluster -n example-namespace get pods 2>&1 | grep -v Running | head -5; done'
