tool_call:
  tool_name: Bash
  tool_input:
    command: cmd > out.log 2>&1
ast:
  type: bash
  raw: cmd > out.log 2>&1
  ast:
    type: redirect
    op: 2>&
    command:
      type: redirect
      op: ">"
      command:
        type: command
        binary: cmd
        options: {}
        cmd: []
        envPrefix: {}
        raw: cmd > out.log 2>&1
      target: out.log
    target: "1"
