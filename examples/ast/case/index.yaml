tool_call:
  tool_name: Bash
  tool_input:
    command: case $1 in start) run;; stop|halt) halt;; *) usage;; esac
ast:
  type: bash
  source: case $1 in start) run;; stop|halt) halt;; *) usage;; esac
  children:
    command:
      type: case_statement
      source: case $1 in start) run;; stop|halt) halt;; *) usage;; esac
      children:
        _:
          - type: command
            source: run
            commandName: run
            options: {}
            positionals: []
            envPrefix: {}
          - type: command
            source: halt
            commandName: halt
            options: {}
            positionals: []
            envPrefix: {}
          - type: command
            source: usage
            commandName: usage
            options: {}
            positionals: []
            envPrefix: {}
      word: $1
      clauses:
        - patterns:
            - start
        - patterns:
            - stop
            - halt
        - patterns:
            - "*"
