tool_call:
  tool_name: Bash
  tool_input:
    command: while read line; do echo $line; done
ast:
  type: bash
  raw: while read line; do echo $line; done
  ast:
    type: while_loop
    until: false
    condition:
      type: command
      binary: read
      options: {}
      cmd: line
      envPrefix: {}
      raw: read line
    body:
      type: command
      binary: echo
      options: {}
      cmd: $line
      envPrefix: {}
      raw: echo $line
    raw: while read line; do echo $line; done
