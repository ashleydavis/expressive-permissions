tool_call:
  tool_name: Bash
  tool_input:
    command: 'cd /work/tf-config && for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
ast:
  type: bash
  raw: 'cd /work/tf-config && for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
  ast:
    type: binop
    op: "&&"
    left:
      type: command
      binary: cd
      options: {}
      cmd: /work/tf-config
      envPrefix: {}
      raw: cd /work/tf-config
    right:
      type: for_loop
      variable: f
      items:
        - behavior_locals.tf
        - behavior_variables.tf
        - versions.tf
      body:
        type: if_statement
        condition:
          type: redirect
          op: 2>&
          command:
            type: redirect
            op: ">"
            command:
              type: command
              binary: diff
              options:
                q: true
              cmd:
                - variant-1a/$f
                - variant-2/$f
              envPrefix: {}
              raw: diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1
            target: /dev/null
          target: "1"
        thenBranch:
          type: command
          binary: echo
          options: {}
          cmd: "SAME (1a==2): $f"
          envPrefix: {}
          raw: 'echo "SAME (1a==2): $f"'
        raw: 'if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi'
        elseBranch:
          type: command
          binary: echo
          options: {}
          cmd: "DIFFERS (1a vs 2): $f"
          envPrefix: {}
          raw: 'echo "DIFFERS (1a vs 2): $f"'
      raw: 'for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
