tool_call:
  tool_name: Bash
  tool_input:
    command: 'cd /work/tf-config && for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
ast:
  type: bash
  source: 'cd /work/tf-config && for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
  children:
    command:
      type: binop
      source: 'cd /work/tf-config && for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
      children:
        left:
          type: command
          source: cd /work/tf-config
          commandName: cd
          options: {}
          positionals:
            - /work/tf-config
          envPrefix: {}
        right:
          type: for_loop
          source: 'for f in behavior_locals.tf behavior_variables.tf versions.tf; do if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi; done'
          children:
            body:
              type: if_statement
              source: 'if diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1; then echo "SAME (1a==2): $f"; else echo "DIFFERS (1a vs 2): $f"; fi'
              children:
                condition:
                  type: redirect
                  source: diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1
                  children:
                    command:
                      type: redirect
                      source: diff -q variant-1a/$f variant-2/$f >/dev/null
                      children:
                        command:
                          type: command
                          source: diff -q variant-1a/$f variant-2/$f >/dev/null 2>&1
                          commandName: diff
                          options:
                            q: true
                          positionals:
                            - variant-1a/$f
                            - variant-2/$f
                          envPrefix: {}
                      op: ">"
                      target: /dev/null
                  op: 2>&
                  target: "1"
                thenBranch:
                  type: command
                  source: 'echo "SAME (1a==2): $f"'
                  commandName: echo
                  options: {}
                  positionals:
                    - "SAME (1a==2): $f"
                  envPrefix: {}
                elseBranch:
                  type: command
                  source: 'echo "DIFFERS (1a vs 2): $f"'
                  commandName: echo
                  options: {}
                  positionals:
                    - "DIFFERS (1a vs 2): $f"
                  envPrefix: {}
          variable: f
          items:
            - behavior_locals.tf
            - behavior_variables.tf
            - versions.tf
      op: "&&"
